name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    name: API — lint, typecheck, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quizbee
          POSTGRES_PASSWORD: quizbee
          POSTGRES_DB: quizbee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://quizbee:quizbee@localhost:5432/quizbee_test
      # Required by app/config.py Settings — use dummy values for CI
      DATABASE_URL: postgresql+asyncpg://quizbee:quizbee@localhost:5432/quizbee_test
      SECRET_KEY: ci-secret-key-not-for-production
      ADMIN_EMAIL: admin@ci.test
      ADMIN_PASSWORD: ci-password

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        working-directory: api
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: api
        run: ruff check app/

      - name: Typecheck (mypy)
        working-directory: api
        run: mypy app/ --ignore-missing-imports --no-error-summary

      - name: Test (pytest)
        working-directory: api
        run: pytest tests/ -v --tb=short

  # ── Web ──────────────────────────────────────────────────────────────────────
  web:
    name: Web — lint, typecheck, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node 24
        uses: actions/setup-node@v4.2.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint (eslint)
        working-directory: web
        run: npm run lint

      - name: Typecheck (tsc)
        working-directory: web
        run: npm run typecheck

      - name: Build (next build)
        working-directory: web
        env:
          # Dummy values so next build doesn't fail on missing env vars
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build
